name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate contact form configuration
        run: |
          test -n "$VITE_FLASK_CONTACT_FORM_API_URL"
          test -n "$VITE_API_KEY"
        env:
          VITE_FLASK_CONTACT_FORM_API_URL: ${{ secrets.VITE_FLASK_CONTACT_FORM_API_URL || vars.VITE_FLASK_CONTACT_FORM_API_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY || vars.VITE_API_KEY }}

      - name: Build
        run: npm run build
        env:
          VITE_FLASK_CONTACT_FORM_API_URL: ${{ secrets.VITE_FLASK_CONTACT_FORM_API_URL || vars.VITE_FLASK_CONTACT_FORM_API_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY || vars.VITE_API_KEY }}

      - name: Copy admin panel to dist
        run: cp -r admin dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
