services:
  - type: web
    name: portfolio
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && npm install && npm run build
    startCommand: python backend/app.py
    envVars:
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    autoDeploy: true